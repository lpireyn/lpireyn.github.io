# GitHub workflow - Publish

name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website sources
        uses: actions/checkout@v4
      - name: Build website
        uses: zolacti/on@build
      - name: Upload website as pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy website on pages
        uses: actions/deploy-pages@v4
